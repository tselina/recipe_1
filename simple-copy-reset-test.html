<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Copy & Reset Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 4px; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Simple Copy & Reset Test</h1>
        <button onclick="runAllTests()">Run All Tests</button>
        <div id="results"></div>
    </div>

    <script src="js/data-models.js"></script>
    <script src="js/storage-manager.js"></script>
    <script src="js/recipe-manager.js"></script>
    <script src="js/barcode-generator.js"></script>

    <script>
        function log(message, isError = false) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = 'test ' + (isError ? 'error' : 'success');
            div.textContent = message;
            results.appendChild(div);
        }

        function runAllTests() {
            document.getElementById('results').innerHTML = '';
            
            try {
                // Initialize
                const storage = new StorageManager();
                const recipeManager = new RecipeManager(storage);
                const barcodeGenerator = new BarcodeGenerator();
                log('✓ Components initialized');

                // Clear data
                storage.clearAll();
                log('✓ Storage cleared');

                // Test 1: Create recipe
                const recipe = recipeManager.createRecipe('Test Cake', [
                    { name: 'Flour', weight: 500 },
                    { name: 'Sugar', weight: 200 }
                ]);
                log(`✓ Recipe created: ${recipe.name} (${recipe.totalWeight}g)`);

                // Test 2: Consume some
                recipeManager.recordConsumption(recipe.id, 300);
                const consumed = recipeManager.getRecipeById(recipe.id);
                log(`✓ Consumed 300g, remaining: ${consumed.remainingWeight}g`);

                // Test 3: Copy recipe
                const copied = recipeManager.copyRecipe(recipe.id, 'Test Cake Copy');
                log(`✓ Recipe copied: ${copied.name}, remaining: ${copied.remainingWeight}g`);

                if (copied.remainingWeight === copied.totalWeight) {
                    log('✓ Copy has full weight (consumption reset)');
                } else {
                    log('✗ Copy weight not reset', true);
                }

                // Test 4: Fully consume original
                recipeManager.markAsFullyConsumed(recipe.id);
                const fullyConsumed = recipeManager.getRecipeById(recipe.id);
                log(`✓ Fully consumed: ${fullyConsumed.remainingWeight}g remaining`);

                // Test 5: Reset recipe
                const reset = recipeManager.resetRecipe(recipe.id);
                log(`✓ Recipe reset: ${reset.remainingWeight}g remaining`);

                if (reset.remainingWeight === reset.totalWeight && reset.lastConsumed === null) {
                    log('✓ Reset successful (full weight, no last consumed)');
                } else {
                    log('✗ Reset failed', true);
                }

                // Test 6: Barcode generation
                const barcode = barcodeGenerator.generateBarcode('TEST123');
                if (barcode.includes('<svg')) {
                    log('✓ Barcode generated successfully');
                } else {
                    log('✗ Barcode generation failed', true);
                }

                // Test 7: Check all recipes
                const allRecipes = recipeManager.getAllRecipes();
                log(`✓ Total recipes in system: ${allRecipes.length}`);

                log('=== ALL TESTS PASSED ===');

            } catch (error) {
                log(`✗ Test failed: ${error.message}`, true);
                console.error(error);
            }
        }

        // Auto-run on load
        window.addEventListener('load', () => {
            setTimeout(runAllTests, 500);
        });
    </script>
</body>
</html>
